// ── HELPERS ──────────────────────────────────────────────────
function daysTo(d){ return Math.max(0, Math.ceil((d - Date.now()) / 86400000)); }
function todayStr(){ return new Date().toDateString(); }
function countStreak(streak){
  if(!streak||!streak.length) return 0;
  let c=0, d=new Date();
  while(streak.includes(d.toDateString())&&c<400){ c++; d.setDate(d.getDate()-1); }
  return c;
}
function calcStats(){
  let tD=0,tT=0,aD=0,aT=0;
  Object.entries(TOPICS).forEach(([s,topics])=>{
    const isTyt=SUBJECTS[s].type==="tyt";
    topics.forEach((_,i)=>{
      if(isTyt){tT++; if(userData.done[s+":"+i])tD++;}
      else{aT++; if(userData.done[s+":"+i])aD++;}
    });
  });
  return{tD,tT,aD,aT,total:tD+aD,all:tT+aT};
}
function getLevel(xp){
  let lvl=LEVELS[0],idx=0;
  for(let i=LEVELS.length-1;i>=0;i--){ if(xp>=LEVELS[i].min){lvl=LEVELS[i];idx=i;break;} }
  const next=LEVELS[Math.min(idx+1,LEVELS.length-1)];
  const pct=idx===LEVELS.length-1?100:Math.round((xp-lvl.min)/(next.min-lvl.min)*100);
  return{lvl,idx,next,pct};
}
function fmtTime(sec){
  const h=Math.floor(sec/3600);
  const m=Math.floor((sec%3600)/60);
  const s=sec%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function todayTotalStudy(){
  return (userData.studySeconds||{})[todayKey()] || 0;
}

// ── TIMER LOGIC ───────────────────────────────────────────────
function timerCurrentSec(){
  if(timerRunning && timerStart) return timerElapsed + Math.floor((Date.now()-timerStart)/1000);
  return timerElapsed;
}
function timerTick(){
  const sec = timerCurrentSec();
  const el = document.getElementById("timerDisplay");
  if(el) el.textContent = fmtTime(sec);
  // also update today total
  const tot = document.getElementById("timerTodayTotal");
  if(tot) tot.textContent = fmtTime(todayTotalStudy() + (timerRunning ? Math.floor((Date.now()-timerStart)/1000) : 0));
}
function timerStartStop(){
  if(!timerRunning){
    timerStart = Date.now();
    timerRunning = true;
    timerInterval = setInterval(timerTick, 1000);
    const btn = document.getElementById("timerBtn");
    if(btn){ btn.textContent="⏸ Durdur"; btn.style.background="#ff4757"; }
    const dot = document.getElementById("timerDot");
    if(dot) dot.style.animation="pulse 1s infinite";
  } else {
    const elapsed = Math.floor((Date.now()-timerStart)/1000);
    timerElapsed += elapsed;
    // save to userData
    if(!userData.studySeconds) userData.studySeconds={};
    userData.studySeconds[todayKey()] = (userData.studySeconds[todayKey()]||0) + elapsed;
    timerStart = null;
    timerRunning = false;
    clearInterval(timerInterval);
    scheduleSave();
    const btn = document.getElementById("timerBtn");
    if(btn){ btn.textContent="▶ Başlat"; btn.style.background="#2ed573"; }
    const dot = document.getElementById("timerDot");
    if(dot) dot.style.animation="none";
    timerTick();
  }
}
function timerReset(){
  if(timerRunning) timerStartStop(); // stop first
  timerElapsed = 0;
  timerStart = null;
  timerTick();
}

// ── TOGGLE TOPIC ─────────────────────────────────────────────
function toggleTopic(subj,i){
  const key=subj+":"+i;
  const wasDone=!!userData.done[key];
  const xpAmt=SUBJECTS[subj].xp;
  userData.done[key]=!wasDone;
  const t=todayStr();
  if(!userData.streak) userData.streak=[];
  if(!userData.streak.includes(t)) userData.streak.push(t);
  if(!wasDone){
    userData.xp+=xpAmt;
    const s=calcStats();
    const p=s.total/s.all;
    let em="✅",ti="KONU TAMAM!",tx="Harika! Bir adım daha attın. Devam et!";
    if(s.total===1){em="⭐";ti="İLK ADIM!";tx="İlk konunu tamamladın. Her büyük yolculuk bir adımla başlar.";}
    else if(s.total===5){em="🔥";ti="MOMENTUM!";tx="5 konu bitti! Ateş yanıyor, durma.";}
    else if(s.total===10){em="💪";ti="ÇALIŞIYOR!";tx="10 konu tamam. Ritim tutturuldu.";}
    else if(p>=0.25&&p<0.27){em="💎";ti="ÇEYREĞİ GEÇTİN!";tx="Konuların %25'ini tamamladın. İnanılmaz!";}
    else if(p>=0.50&&p<0.52){em="🚀";ti="YARIYA GELDİN!";tx="%50 tamamlandı. Çoğu insan bu noktaya gelemez.";}
    else if(p>=0.75&&p<0.77){em="👑";ti="NEREDEYSE BİTTİ!";tx="%75 tamamlandı. Zirve görünüyor!";}
    else if(p>=1){em="🏆";ti="EFSANE!";tx="Tüm konuları tamamladın. Sen artık başka birisin.";}
    showReward(em,ti,tx,xpAmt);
  } else {
    userData.xp=Math.max(0,userData.xp-xpAmt);
  }
  scheduleSave();
  renderTopics();
  renderStats();
}

async function doRegister(){

  err.textContent="Kayıt yapılıyor...";

    const cred=await createUserWithEmailAndPassword(auth,email,pass);

  const pass=document.getElementById("authPass").value;

    if(e.code==="auth/invalid-credential"||e.code==="auth/wrong-password") err.textContent="E-posta veya şifre hatalı!";
    else if(e.code==="auth/user-not-found") err.textContent="Bu e-posta ile kayıtlı kullanıcı yok!";
    else if(e.code==="auth/invalid-email") err.textContent="Geçersiz e-posta adresi!";

// ── RENDER STATS ──────────────────────────────────────────────
function renderStats(){
  const s=calcStats();
  const {lvl,idx,next,pct}=getLevel(userData.xp);
  const tytPct=s.tT?Math.round(s.tD/s.tT*100):0;
  const aytPct=s.aT?Math.round(s.aD/s.aT*100):0;
  elSet("sTotalDone",s.total);
  elSet("sTotalLeft",s.all-s.total);
  elSet("sXP",userData.xp);
  elSet("sStreak",countStreak(userData.streak||[])+" 🔥");
  elSet("sLevelBadge","LVL "+(idx+1));
  elSet("sLevelName",lvl.name);
  elSet("sXPLabel",userData.xp+" / "+next.min+" XP");
  barSet("xpBar",pct,"linear-gradient(90deg,#ffd60a,#ff6b35)");
  barSet("tytBar",tytPct,"#00d4ff");
  barSet("aytBar",aytPct,"#ff6b35");
  pctSet("tytPct",tytPct);
  pctSet("aytPct",aytPct);
  buildStreakRow();
}
function buildStreakRow(){
  const streakRow=document.getElementById("streakRow");
  if(!streakRow) return;
  streakRow.innerHTML="";
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()-6+i);
    const ds=d.toDateString();
    const isDone=(userData.streak||[]).includes(ds);
    const isToday=ds===todayStr();
    const div=document.createElement("div");
    div.style.cssText=`width:32px;height:32px;border-radius:6px;display:flex;align-items:center;
      justify-content:center;font-family:monospace;font-size:0.65rem;font-weight:600;
      background:${isDone?"#2ed573":"transparent"};
      border:1px solid ${isDone?"#2ed573":isToday?"#00d4ff":"rgba(255,255,255,0.1)"};
      color:${isDone?"#000":isToday?"#00d4ff":"#5a6a7e"};`;
    div.textContent=d.getDate();
    if(isToday){
      const label=document.createElement("div");
      label.style.cssText=`font-family:monospace;font-size:0.55rem;color:#00d4ff;text-align:center;margin-top:3px;`;
      label.textContent="bugün";
      const wrap=document.createElement("div");
      wrap.style.cssText="display:flex;flex-direction:column;align-items:center;";
      wrap.appendChild(div);
      wrap.appendChild(label);
      streakRow.appendChild(wrap);
    } else {
      streakRow.appendChild(div);
    }
  }
}

function elSet(id,val){ const e=document.getElementById(id); if(e) e.textContent=val; }
function barSet(id,w,clr){ const e=document.getElementById(id); if(e){e.style.width=w+"%";e.style.background=clr;} }

      <button id="authToggleBtn" style="width:100%;margin-top:12px;background:transparent;
        border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#5a6a7e;font-size:0.85rem;cursor:pointer;padding:10px;">
        ${isLogin?"Hesabın yok mu? Kayıt ol":"Zaten hesabın var mı? Giriş yap"}</button>
      <p style="text-align:center;color:#5a6a7e;font-size:0.75rem;margin-top:16px;line-height:1.5;">
        🔒 Verilen bilgiler sadece YKS takibinde kullanılır.</p>
    </div>
  </div>`;
  document.getElementById("authMainBtn").addEventListener("click", isLogin?doLogin:doRegister);
  document.getElementById("authToggleBtn").addEventListener("click", ()=>{ authMode=isLogin?"register":"login"; renderAuth(); });
  document.getElementById("authPass").addEventListener("keydown", e=>{ if(e.key==="Enter") isLogin?doLogin():doRegister(); });
}

function renderDashboard(){

  const tytPct=s.tT?Math.round(s.tD/s.tT*100):0;
  const aytPct=s.aT?Math.round(s.aD/s.aT*100):0;
  const streak=countStreak(userData.streak||[]);
  document.getElementById("root").innerHTML=`
  <div style="max-width:1280px;margin:0 auto;padding:24px 20px;">
    ${navHTML("dashboard")}

    <!-- Geri sayım -->
    <div style="background:#0d1421;border:1px solid rgba(255,255,255,0.07);border-radius:16px;

      <div style="position:absolute;top:0;left:0;right:0;height:2px;
        background:linear-gradient(90deg,transparent,#00d4ff,#ff6b35,transparent);"></div>

        ${tytDays}</div>

      ${[
        {v:s.total,       l:"KONU BİTİRİLDİ", c:"#2ed573", id:"sTotalDone"},
        {v:s.all-s.total, l:"KONU KALDI",      c:"#5a6a7e", id:"sTotalLeft"},
        {v:userData.xp,   l:"TOPLAM XP",       c:"#ffd60a", id:"sXP"},
        {v:streak+" 🔥",  l:"GÜN SERİSİ",     c:"#a855f7", id:"sStreak"},
      ].map(c=>`<div style="background:#0d1421;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px;text-align:center;">
        <div id="${c.id}" style="font-size:2rem;font-weight:800;color:${c.c};margin-bottom:4px;">${c.v}</div>
        <div style="font-family:monospace;font-size:0.62rem;letter-spacing:2px;color:#5a6a7e;">${c.l}</div>
      </div>`).join("")}
    </div>

    <!-- Seviye & ilerleme -->
    <div style="background:#0d1421;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:24px;margin-bottom:20px;">
      <div style="font-size:0.72rem;font-weight:700;letter-spacing:3px;color:#5a6a7e;margin-bottom:16px;font-family:monospace;">SEVİYE & İLERLEME</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div id="sLevelBadge" style="background:linear-gradient(135deg,#ffd60a,#ff9f00);color:#000;font-weight:800;
          font-size:0.8rem;padding:6px 14px;border-radius:20px;white-space:nowrap;">LVL ${idx+1}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span id="sLevelName" style="font-family:monospace;font-size:0.72rem;color:#ffd60a;">${lvl.name}</span>
            <span id="sXPLabel" style="font-family:monospace;font-size:0.72rem;color:#5a6a7e;">${userData.xp} / ${next.min} XP</span>
          </div>
          <div style="background:rgba(255,255,255,0.06);border-radius:100px;height:8px;overflow:hidden;">
            <div id="xpBar" style="height:100%;border-radius:100px;transition:width 0.8s;width:${pct}%;background:linear-gradient(90deg,#ffd60a,#ff6b35);"></div>
          </div>
        </div>
      </div>
      ${[{l:"TYT",p:tytPct,c:"#00d4ff",bi:"tytBar",pi:"tytPct"},{l:"AYT",p:aytPct,c:"#ff6b35",bi:"aytBar",pi:"aytPct"}].map(b=>`
      <div style="margin-top:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-family:monospace;font-size:0.72rem;color:${b.c};">${b.l}</span>
          <span id="${b.pi}" style="font-family:monospace;font-size:0.72rem;color:#5a6a7e;">${b.p}%</span>
        </div>
        <div style="background:rgba(255,255,255,0.06);border-radius:100px;height:6px;overflow:hidden;">
          <div id="${b.bi}" style="height:100%;border-radius:100px;width:${b.p}%;background:${b.c};transition:width 0.8s;"></div>
        </div>
      </div>`).join("")}
    </div>

    <!-- Seri -->
    <div style="background:#0d1421;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:24px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-size:0.72rem;font-weight:700;letter-spacing:3px;color:#5a6a7e;font-family:monospace;">BU HAFTAKİ SERİ</div>
        <div style="font-family:monospace;font-size:0.75rem;color:#2ed573;">${streak} gün üst üste 🔥</div>
      </div>
      <div id="streakRow" style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;"></div>
      <div style="margin-top:12px;font-size:0.78rem;color:#5a6a7e;font-family:monospace;">
        💡 Her gün en az bir konu tiklersen serin devam eder.
      </div>
    </div>

    <!-- Çalışma Kronometresi -->
    <div style="background:#0d1421;border:1px solid rgba(0,212,255,0.2);border-radius:12px;padding:24px;margin-bottom:20px;">
      <div style="font-size:0.72rem;font-weight:700;letter-spacing:3px;color:#5a6a7e;margin-bottom:16px;font-family:monospace;">
        ⏱ GÜNLÜK ÇALIŞMA KRONOMETRESİ
      </div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
        <div style="flex:1;min-width:200px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div id="timerDot" style="width:10px;height:10px;border-radius:50%;background:#2ed573;flex-shrink:0;"></div>
            <div id="timerDisplay" style="font-family:monospace;font-size:2.5rem;font-weight:700;
              color:#00d4ff;letter-spacing:4px;">00:00:00</div>
          </div>
          <div style="font-family:monospace;font-size:0.7rem;color:#5a6a7e;">
            Bugün toplam: <span id="timerTodayTotal" style="color:#2ed573;">${fmtTime(todayTotalStudy())}</span>
          </div>
        </div>
        <div style="display:flex;gap:10px;">
          <button id="timerBtn" style="background:#2ed573;border:none;color:#000;
            padding:12px 24px;border-radius:8px;font-weight:800;font-size:0.9rem;cursor:pointer;
            font-family:monospace;letter-spacing:1px;">▶ Başlat</button>
          <button id="timerResetBtn" style="background:transparent;border:1px solid rgba(255,255,255,0.1);
            color:#5a6a7e;padding:12px 16px;border-radius:8px;font-size:0.9rem;cursor:pointer;
            font-family:monospace;">↺ Sıfırla</button>
        </div>
      </div>
    </div>

    <!-- Motivasyon -->
    <div style="background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(255,107,53,0.05));
      border:1px solid rgba(0,212,255,0.2);border-radius:12px;padding:24px;">
      <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#ff6b35);
        display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:14px;">🤖</div>
      <div style="font-size:1.1rem;line-height:1.75;border-left:3px solid #00d4ff;padding-left:16px;
        font-style:italic;font-weight:600;color:#e8edf5;">
        ${MOTIVATION}</div>
    </div>
  </div>`;

  attachNav("dashboard");
  renderStats();

  // Timer buton event'leri
  document.getElementById("timerBtn").addEventListener("click", timerStartStop);
  document.getElementById("timerResetBtn").addEventListener("click", timerReset);
  // Eğer timer zaten çalışıyorsa UI'yi düzelt
  if(timerRunning){
    const btn=document.getElementById("timerBtn");
    if(btn){ btn.textContent="⏸ Durdur"; btn.style.background="#ff4757"; }
    const dot=document.getElementById("timerDot");
    if(dot) dot.style.animation="pulse 1s infinite";
  }
  timerTick();
}

function renderTopicsPage(){
  document.getElementById("root").innerHTML=`
  <div style="max-width:1280px;margin:0 auto;padding:24px 20px;">
    ${navHTML("topics")}
    <div style="font-size:0.72rem;font-weight:700;letter-spacing:3px;color:#5a6a7e;margin-bottom:16px;font-family:monospace;">
      📚 KONU ÇİZELGESİ — <span style="color:#00d4ff;">BİTİRDİĞİNDE TIKla</span>
    </div>

    <!-- TYT grubu -->
    <div style="font-family:monospace;font-size:0.65rem;letter-spacing:3px;color:#00d4ff;
      margin-bottom:8px;padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.15);">TYT</div>
    <div id="tytTabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>

    <!-- AYT grubu -->
    <div style="font-family:monospace;font-size:0.65rem;letter-spacing:3px;color:#ff6b35;
      margin-bottom:8px;padding:4px 0;border-bottom:1px solid rgba(255,107,53,0.15);">AYT</div>
    <div id="aytTabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>

    <div id="topicList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;"></div>
  </div>`;
  attachNav("topics");

  const tytContainer=document.getElementById("tytTabs");
  const aytContainer=document.getElementById("aytTabs");
  Object.entries(SUBJECTS).forEach(([key,sub])=>{
    const btn=document.createElement("button");
    btn.className="subTab";
    btn.dataset.s=key;
    const doneCount=TOPICS[key].filter((_,i)=>userData.done[key+":"+i]).length;
    btn.style.cssText=`padding:8px 16px;border-radius:8px;font-family:monospace;font-size:0.7rem;letter-spacing:1px;
      cursor:pointer;transition:all 0.2s;
      background:${activeSub===key?sub.color:"transparent"};
      border:1px solid ${activeSub===key?sub.color:"rgba(255,255,255,0.07)"};
      color:${activeSub===key?"#000":"#5a6a7e"};font-weight:${activeSub===key?700:400};`;
    btn.innerHTML=`${sub.label} <span style="opacity:0.7;font-size:0.6rem;margin-left:5px;">(${doneCount}/${TOPICS[key].length})</span>`;
    btn.addEventListener("click",()=>setSubject(key));
    (sub.type==="tyt"?tytContainer:aytContainer).appendChild(btn);
  });
  renderTopics();
}

function renderCoachPage(){
  document.getElementById("root").innerHTML=`
  <div style="max-width:1280px;margin:0 auto;padding:24px 20px;">
    ${navHTML("coach")}
    <div style="background:#0d1421;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:24px;">

        display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:12px;">🤖</div>

          <input id="coachInp" placeholder="Koçuna bir şey sor..."
