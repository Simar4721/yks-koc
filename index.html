// ── HELPERS ──────────────────────────────────────────────────
function daysTo(d){ return Math.max(0, Math.ceil((d - Date.now()) / 86400000)); }
function todayStr(){ return new Date().toDateString(); }
function countStreak(streak){
  if(!streak||!streak.length) return 0;
  let c=0, d=new Date();
  while(streak.includes(d.toDateString())&&c<400){ c++; d.setDate(d.getDate()-1); }
  return c;
}
function calcStats(){
  let tD=0,tT=0,aD=0,aT=0;
  Object.entries(TOPICS).forEach(([s,topics])=>{
    const isTyt=SUBJECTS[s].type==="tyt";
    topics.forEach((_,i)=>{
      if(isTyt){tT++; if(userData.done[s+":"+i])tD++;}
      else{aT++; if(userData.done[s+":"+i])aD++;}
    });
  });
  return{tD,tT,aD,aT,total:tD+aD,all:tT+aT};
}
function getLevel(xp){
  let lvl=LEVELS[0],idx=0;
  for(let i=LEVELS.length-1;i>=0;i--){ if(xp>=LEVELS[i].min){lvl=LEVELS[i];idx=i;break;} }
  const next=LEVELS[Math.min(idx+1,LEVELS.length-1)];
  const pct=idx===LEVELS.length-1?100:Math.round((xp-lvl.min)/(next.min-lvl.min)*100);
  return{lvl,idx,next,pct};
}
function fmtTime(sec){
  const h=Math.floor(sec/3600);
  const m=Math.floor((sec%3600)/60);
  const s=sec%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function todayTotalStudy(){
  return (userData.studySeconds||{})[todayKey()] || 0;
}

// ── TIMER LOGIC ───────────────────────────────────────────────
function timerCurrentSec(){
  if(timerRunning && timerStart) return timerElapsed + Math.floor((Date.now()-timerStart)/1000);
  return timerElapsed;
}
function timerTick(){
  const sec = timerCurrentSec();
  const el = document.getElementById("timerDisplay");
  if(el) el.textContent = fmtTime(sec);
  // also update today total
  const tot = document.getElementById("timerTodayTotal");
  if(tot) tot.textContent = fmtTime(todayTotalStudy() + (timerRunning ? Math.floor((Date.now()-timerStart)/1000) : 0));
}
function timerStartStop(){
  if(!timerRunning){
    timerStart = Date.now();
    timerRunning = true;
    timerInterval = setInterval(timerTick, 1000);
    // Bugünü streak'e ekle
    const t=todayStr();
    if(!userData.streak) userData.streak=[];
    if(!userData.streak.includes(t)){
      userData.streak.push(t);
      updateStreakRecord();
      scheduleSave();
      // Uyarı banner'ını kaldır
      const banner=document.getElementById("noChallengeWarning");
      if(banner) banner.remove();
    }
    const btn = document.getElementById("timerBtn");
    if(btn){ btn.textContent="⏸ Durdur"; btn.style.background="#ff4757"; }
    const dot = document.getElementById("timerDot");
    if(dot) dot.style.animation="pulse 1s infinite";
  } else {
    const elapsed = Math.floor((Date.now()-timerStart)/1000);
    timerElapsed += elapsed;
    // save to userData
    if(!userData.studySeconds) userData.studySeconds={};
    userData.studySeconds[todayKey()] = (userData.studySeconds[todayKey()]||0) + elapsed;
    timerStart = null;
    timerRunning = false;
    clearInterval(timerInterval);
    scheduleSave();
    const btn = document.getElementById("timerBtn");
    if(btn){ btn.textContent="▶ Başlat"; btn.style.background="#2ed573"; }
    const dot = document.getElementById("timerDot");
    if(dot) dot.style.animation="none";
    timerTick();
  }
}
function timerReset(){
  if(timerRunning) timerStartStop(); // stop first
  timerElapsed = 0;
  timerStart = null;
  timerTick();
}

    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    total+=(ss[k]||0);
  }
  return total;
}
function updateStreakRecord(){
  const cur=countStreak(userData.streak||[]);
  if(cur>(userData.streakRecord||0)){
    userData.streakRecord=cur;
  }
}


// ── TOGGLE TOPIC ─────────────────────────────────────────────
function toggleTopic(subj,i){
  const key=subj+":"+i;
  const wasDone=!!userData.done[key];
  const xpAmt=SUBJECTS[subj].xp;
  userData.done[key]=!wasDone;
  const t=todayStr();
  if(!userData.streak) userData.streak=[];
  if(!userData.streak.includes(t)) userData.streak.push(t);
  updateStreakRecord();
  if(!wasDone){
    userData.xp+=xpAmt;
    const s=calcStats();
    const p=s.total/s.all;
    let em="✅",ti="KONU TAMAM!",tx="Harika! Bir adım daha attın. Devam et!";
    if(s.total===1){em="⭐";ti="İLK ADIM!";tx="İlk konunu tamamladın. Her büyük yolculuk bir adımla başlar.";}
    else if(s.total===5){em="🔥";ti="MOMENTUM!";tx="5 konu bitti! Ateş yanıyor, durma.";}
    else if(s.total===10){em="💪";ti="ÇALIŞIYOR!";tx="10 konu tamam. Ritim tutturuldu.";}
    else if(p>=0.25&&p<0.27){em="💎";ti="ÇEYREĞİ GEÇTİN!";tx="Konuların %25'ini tamamladın. İnanılmaz!";}
    else if(p>=0.50&&p<0.52){em="🚀";ti="YARIYA GELDİN!";tx="%50 tamamlandı. Çoğu insan bu noktaya gelemez.";}
    else if(p>=0.75&&p<0.77){em="👑";ti="NEREDEYSE BİTTİ!";tx="%75 tamamlandı. Zirve görünüyor!";}
    else if(p>=1){em="🏆";ti="EFSANE!";tx="Tüm konuları tamamladın. Sen artık başka birisin.";}
    showReward(em,ti,tx,xpAmt);
  } else {
    userData.xp=Math.max(0,userData.xp-xpAmt);
  }
  scheduleSave();
  renderTopics();
  renderStats();
}

function renderStats(){
  const s=calcStats();
  const {lvl,idx,next,pct}=getLevel(userData.xp);
  const tytPct=s.tT?Math.round(s.tD/s.tT*100):0;
  const aytPct=s.aT?Math.round(s.aD/s.aT*100):0;
  elSet("sTotalDone",s.total);
  elSet("sTotalLeft",s.all-s.total);
  elSet("sXP",userData.xp);
  elSet("sStreak",countStreak(userData.streak||[])+" 🔥");
  elSet("sLevelBadge","LVL "+(idx+1));
  elSet("sLevelName",lvl.name);
  elSet("sXPLabel",userData.xp+" / "+next.min+" XP");
  barSet("xpBar",pct,"linear-gradient(90deg,#ffd60a,#ff6b35)");
  barSet("tytBar",tytPct,"#00d4ff");
  barSet("aytBar",aytPct,"#ff6b35");
  pctSet("tytPct",tytPct);
  pctSet("aytPct",aytPct);
  buildStreakRow();
}
function buildStreakRow(){
  const streakRow=document.getElementById("streakRow");
  if(!streakRow) return;
  streakRow.innerHTML="";
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()-6+i);
    const ds=d.toDateString();
    const isDone=(userData.streak||[]).includes(ds);
    const isToday=ds===todayStr();
    const div=document.createElement("div");
    div.style.cssText=`width:32px;height:32px;border-radius:6px;display:flex;align-items:center;
      justify-content:center;font-family:monospace;font-size:0.65rem;font-weight:600;
      background:${isDone?"#2ed573":"transparent"};
      border:1px solid ${isDone?"#2ed573":isToday?"#00d4ff":"rgba(255,255,255,0.1)"};
      color:${isDone?"#000":isToday?"#00d4ff":"#5a6a7e"};`;
    div.textContent=d.getDate();
    if(isToday){
      const label=document.createElement("div");
      label.style.cssText=`font-family:monospace;font-size:0.55rem;color:#00d4ff;text-align:center;margin-top:3px;`;
      label.textContent="bugün";
      const wrap=document.createElement("div");
      wrap.style.cssText="display:flex;flex-direction:column;align-items:center;";
      wrap.appendChild(div);
      wrap.appendChild(label);
      streakRow.appendChild(wrap);
    } else {
      streakRow.appendChild(div);
    }
  }
}

      topics.forEach((name,i)=>{

        found++;
        const isDone=!!userData.done[subKey+":"+i];
        const d=document.createElement("div");
        d.style.cssText=`display:flex;align-items:center;gap:10px;
          background:${isDone?"rgba(46,213,115,0.08)":"var(--bg3)"};
          border:1px solid ${isDone?"rgba(46,213,115,0.3)":"var(--border)"};
          border-radius:8px;padding:11px 13px;cursor:pointer;transition:all 0.2s;`;
        d.addEventListener("click",()=>toggleTopic(subKey,i));
        d.innerHTML=`
          <div style="width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;
            justify-content:center;font-size:0.8rem;
            background:${isDone?"#2ed573":"transparent"};
            border:2px solid ${isDone?"#2ed573":"rgba(255,255,255,0.15)"};">${isDone?"✓":""}</div>
          <div style="font-size:0.87rem;line-height:1.35;flex:1;
            text-decoration:${isDone?"line-through":"none"};
            color:${isDone?"var(--text2)":"var(--text)"};">${name}</div>
          <div style="font-family:monospace;font-size:0.6rem;padding:2px 7px;border-radius:4px;
            letter-spacing:1px;flex-shrink:0;
            background:${sub.color}22;color:${sub.color};">${sub.label}</div>`;
        list.appendChild(d);
      });
    });
    if(!found){
      list.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--text2);font-family:monospace;font-size:0.85rem;">
        "${searchQuery}" ile eşleşen konu bulunamadı.</div>`;

    return;
  }

  // Normal mode — show active subject
  const topics=TOPICS[activeSub]||[];
  const type=SUBJECTS[activeSub].type;
  topics.forEach((name,i)=>{
    const isDone=!!userData.done[activeSub+":"+i];

        color:${type==="tyt"?"#00d4ff":"#ff6b35"};">${type.toUpperCase()}</div>`;

}

function attachNav(active){
  const nav=document.getElementById("mainNav");
  if(!nav) return;
  const pages=[["dashboard","📊 Panel"],["topics","📚 Konular"],["exams","📝 Denemeler"],["coach","🤖 Koç"],["profile","👤 Profil"]];
  if(isAdmin()) pages.push(["admin","🛡 Admin"]);
  pages.forEach(([p,label])=>{
    const btn=document.createElement("button");
    const isAdminPage=p==="admin";
    const isActive=active===p;
    btn.style.cssText=`background:${isActive?(isAdminPage?"rgba(255,214,10,0.15)":"rgba(0,212,255,0.1)"):"transparent"};
      border:1px solid ${isActive?(isAdminPage?"#ffd60a":"#00d4ff"):(isAdminPage?"rgba(255,214,10,0.3)":"var(--border)")};
      color:${isActive?(isAdminPage?"#ffd60a":"#00d4ff"):(isAdminPage?"rgba(255,214,10,0.6)":"var(--text2)")};
      padding:8px 18px;border-radius:6px;font-family:monospace;font-size:0.72rem;cursor:pointer;letter-spacing:1px;`;
    btn.textContent=label;
    btn.addEventListener("click",()=>setPage(p));
    nav.appendChild(btn);
  });
  const themeBtn=document.createElement("button");
  themeBtn.id="themeBtn";
  themeBtn.style.cssText=`background:transparent;border:1px solid var(--border);
    color:var(--text2);padding:8px 12px;border-radius:6px;font-size:0.85rem;cursor:pointer;`;
  themeBtn.textContent=isDark?"☀️":"🌙";
  themeBtn.addEventListener("click",toggleTheme);
  nav.appendChild(themeBtn);
  const logoutBtn=document.createElement("button");
  logoutBtn.style.cssText=`background:transparent;border:1px solid rgba(255,100,100,0.3);
    color:#ff4757;padding:8px 14px;border-radius:6px;font-family:monospace;font-size:0.72rem;cursor:pointer;`;
  logoutBtn.textContent="Çıkış";
  logoutBtn.addEventListener("click",doLogout);
  nav.appendChild(logoutBtn);
}

function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle("light",!isDark);

  // Update theme button icon wherever it is
  const btn=document.getElementById("themeBtn");
  if(btn) btn.textContent=isDark?"☀️":"🌙";
}

const TYT_EXAM_SUBJECTS=[
  {key:"tyt-turk",label:"Türkçe",   total:40},
  {key:"tyt-sos", label:"Sosyal",   total:20},
  {key:"tyt-mat", label:"Matematik",total:40},
  {key:"tyt-fen", label:"Fen",      total:20},
];
const AYT_EXAM_SUBJECTS=[
  {key:"ayt-mat", label:"Matematik",total:30},
  {key:"ayt-geo", label:"Geometri", total:10},
  {key:"ayt-fiz", label:"Fizik",    total:14},
  {key:"ayt-kim", label:"Kimya",    total:13},
  {key:"ayt-bio", label:"Biyoloji", total:13},

function calcNet(d,y){ return d-y/4; }
function calcExamTotals(exam){
  const subs=exam.type==="tyt"?TYT_EXAM_SUBJECTS:AYT_EXAM_SUBJECTS;
  let t=0; subs.forEach(s=>{ t+=calcNet(exam.scores?.[s.key]?.d||0, exam.scores?.[s.key]?.y||0); }); return Math.round(t*100)/100;
}

function drawNetChart(container,tytE,aytE){
  const allNets=[...tytE.map(e=>calcExamTotals(e)),...aytE.map(e=>calcExamTotals(e))];
  const maxNet=Math.max(...allNets,1);
  const minNet=Math.min(...allNets,0);
  const range=Math.max(maxNet-minNet,1);
  const cnt=Math.max(tytE.length,aytE.length,2);
  const W=Math.max(500,cnt*80),H=180,pad={l:36,r:16,t:16,b:32};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;

  // y position: higher net = higher on screen (lower y value)
  function yPos(net){ return pad.t + cH - ((net-minNet)/range)*cH; }
  function pts(ex){ if(ex.length<2) return null; return ex.map((e,i)=>[ pad.l+(i/(ex.length-1))*cW, yPos(calcExamTotals(e)) ]); }
  function polyline(p,c){
    if(!p) return "";
    const d=p.map((pt,i)=>(i===0?"M":"L")+pt[0].toFixed(1)+","+pt[1].toFixed(1)).join(" ");
    // value labels above each point
    const labels=p.map((pt,i)=>{
      const ex=(c==="#00d4ff"?tytE:aytE)[i];
      return `<text x="${pt[0].toFixed(1)}" y="${(pt[1]-8).toFixed(1)}" text-anchor="middle" fill="${c}" font-size="9" font-family="monospace" font-weight="600">${calcExamTotals(ex).toFixed(1)}</text>`;
    }).join("");
    return `<path d="${d}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${p.map(pt=>`<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="4" fill="${c}" stroke="#080c14" stroke-width="1.5"/>`).join("")}
      ${labels}`;
  }
  const lSrc=tytE.length>=aytE.length?tytE:aytE;
  const xLabels=lSrc.map((e,i)=>{
    const x=(pad.l+(i/Math.max(lSrc.length-1,1))*cW).toFixed(1);
    return `<text x="${x}" y="${H-6}" text-anchor="middle" fill="#5a6a7e" font-size="10" font-family="monospace">${e.date.slice(5)}</text>`;
  }).join("");
  const grid=[0,0.25,0.5,0.75,1].map(f=>{
    const netVal=minNet+f*range;
    const y=(pad.t+cH-f*cH).toFixed(1);
    return `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-dasharray="3,3"/>
      <text x="${(pad.l-4)}" y="${(parseFloat(y)+3).toFixed(1)}" text-anchor="end" fill="rgba(255,255,255,0.25)" font-size="9" font-family="monospace">${netVal.toFixed(0)}</text>`;
  }).join("");

  container.innerHTML=`
  <svg width="${W}" height="${H}" style="min-width:${W}px;display:block;">
    ${grid}
    ${polyline(pts(tytE),"#00d4ff")}
    ${polyline(pts(aytE),"#ff6b35")}
    ${xLabels}
  </svg>
  <div style="display:flex;gap:16px;margin-top:8px;">
    ${tytE.length>0?`<div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:3px;background:#00d4ff;border-radius:2px;"></div><span style="font-family:monospace;font-size:0.65rem;color:#5a6a7e;">TYT</span></div>`:""}
    ${aytE.length>0?`<div style="display:flex;align-items:center;gap:6px;"><div style="width:14px;height:3px;background:#ff6b35;border-radius:2px;"></div><span style="font-family:monospace;font-size:0.65rem;color:#5a6a7e;">AYT</span></div>`:""}
  </div>`;
}

// ── DONUT CHART ───────────────────────────────────────────────
function makeDonut(pct, color, size=72){
  const r=28, cx=size/2, cy=size/2;
  const circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  const gap=circ-dash;
  // start from top (-90deg = -PI/2)
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${(circ*0.25).toFixed(2)}"
      stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dasharray 0.8s ease;"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
      fill="${color}" font-size="11" font-family="monospace" font-weight="700">${pct}%</text>
  </svg>`;
}

function renderDonutSection(){
  const el=document.getElementById("donutSection");
  if(!el) return;
  el.innerHTML=Object.entries(SUBJECTS).map(([key,sub])=>{
    const total=TOPICS[key].length;
    const done=TOPICS[key].filter((_,i)=>userData.done[key+":"+i]).length;
    const pct=total?Math.round(done/total*100):0;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;
      background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;min-width:90px;">
      ${makeDonut(pct,sub.color)}
      <div style="font-family:monospace;font-size:0.58rem;color:#5a6a7e;text-align:center;letter-spacing:0.5px;line-height:1.4;">${sub.label}</div>
      <div style="font-family:monospace;font-size:0.65rem;color:${sub.color};font-weight:700;">${done}/${total}</div>
    </div>`;
  }).join("");
}

// ── ADMIN PAGE ────────────────────────────────────────────────
async function renderAdminPage(){
  document.getElementById("root").innerHTML=`
  <div style="max-width:1280px;margin:0 auto;padding:24px 20px;">
    ${navHTML("admin")}
    <div style="font-size:0.72rem;font-weight:700;letter-spacing:3px;color:#ffd60a;margin-bottom:20px;font-family:monospace;">
      🛡 ADMİN PANELİ — TÜM KULLANICILARIN VERİLERİ
    </div>
    <div id="adminContent" style="display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text2);font-family:monospace;">
      <div style="width:32px;height:32px;border:3px solid rgba(0,212,255,0.2);border-top-color:#00d4ff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      &nbsp;&nbsp;Kullanıcılar yükleniyor...
    </div>
  </div>`;
  attachNav("admin");

  try{
    const snap = await getDocs(collection(db,"users"));
    const users = [];
    snap.forEach(d => users.push({uid:d.id, ...d.data()}));

    // Sort by XP desc
    users.sort((a,b)=>(b.xp||0)-(a.xp||0));

    const totalUsers = users.length;
    const totalDone = users.reduce((s,u)=>s+Object.keys(u.done||{}).length,0);
    const activeToday = users.filter(u=>(u.streak||[]).includes(todayStr())).length;
    const avgXP = totalUsers ? Math.round(users.reduce((s,u)=>s+(u.xp||0),0)/totalUsers) : 0;

    const content = document.getElementById("adminContent");
    content.innerHTML=`
      <!-- Özet kartlar -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px;">
        ${[
          {v:totalUsers,   l:"TOPLAM KULLANICI", c:"#00d4ff"},
          {v:activeToday,  l:"BUGÜN AKTİF",      c:"#2ed573"},
          {v:totalDone,    l:"TOPLAM TİK",        c:"#ffd60a"},
          {v:avgXP,        l:"ORTALAMA XP",       c:"#a855f7"},
        ].map(c=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;">
          <div style="font-size:2rem;font-weight:800;color:${c.c};margin-bottom:4px;">${c.v}</div>
          <div style="font-family:monospace;font-size:0.62rem;letter-spacing:2px;color:var(--text2);">${c.l}</div>
        </div>`).join("")}
      </div>

      <!-- Kullanıcı tablosu -->
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div style="font-family:monospace;font-size:0.72rem;letter-spacing:2px;color:var(--text2);">KULLANICI LİSTESİ</div>
          <div style="font-family:monospace;font-size:0.72rem;color:var(--text2);">${totalUsers} kullanıcı</div>
        </div>
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid var(--border);">
                ${["#","İSİM","E-POSTA","XP","KONU","SERİ","BUGÜN AKTİF","DENEME","SON ÇALIŞMA"].map(h=>
                  `<th style="padding:10px 16px;text-align:left;font-family:monospace;font-size:0.62rem;letter-spacing:1px;color:var(--text2);white-space:nowrap;">${h}</th>`
                ).join("")}
              </tr>
            </thead>
            <tbody>
              ${users.map((u,i)=>{
                const done=Object.keys(u.done||{}).length;
                const streak=countStreak(u.streak||[]);
                const activeNow=(u.streak||[]).includes(todayStr());
                const exams=(u.exams||[]).length;
                const ss=u.studySeconds||{};
                const lastStudyDate=Object.keys(ss).sort().reverse()[0]||"—";
                const lastStudySec=ss[lastStudyDate]||0;
                return `<tr style="border-bottom:1px solid var(--border);${i%2===0?"":"background:var(--bg3)"}">
                  <td style="padding:12px 16px;font-family:monospace;font-size:0.75rem;color:var(--text2);">${i+1}</td>
                  <td style="padding:12px 16px;">
                    <div style="display:flex;align-items:center;gap:10px;">
                      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#ff6b35);
                        display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;color:#000;flex-shrink:0;">
                        ${(u.name||"?")[0].toUpperCase()}
                      </div>
                      <span style="font-weight:600;font-size:0.9rem;">${u.name||"—"}</span>
                    </div>
                  </td>
                  <td style="padding:12px 16px;font-family:monospace;font-size:0.72rem;color:var(--text2);">${u.uid===ADMIN_UID?"👑 "+currentUser?.email:u.name?"":"—"}</td>
                  <td style="padding:12px 16px;font-family:monospace;font-size:0.85rem;font-weight:700;color:#ffd60a;">${u.xp||0}</td>
                  <td style="padding:12px 16px;font-family:monospace;font-size:0.85rem;color:#00d4ff;">${done}</td>
                  <td style="padding:12px 16px;font-family:monospace;font-size:0.85rem;color:#a855f7;">${streak} 🔥</td>
                  <td style="padding:12px 16px;text-align:center;">
                    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;
                      background:${activeNow?"#2ed573":"rgba(255,255,255,0.1)"};"></span>
                  </td>
                  <td style="padding:12px 16px;font-family:monospace;font-size:0.85rem;color:#ff6b35;">${exams}</td>
                  <td style="padding:12px 16px;font-family:monospace;font-size:0.72rem;color:var(--text2);">
                    ${lastStudyDate!=="—"?`${lastStudyDate}<br><span style="color:#2ed573;">${fmtTime(lastStudySec)}</span>`:"—"}
                  </td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e){
    document.getElementById("adminContent").innerHTML=`
      <div style="text-align:center;padding:48px;color:#ff4757;font-family:monospace;">
        Veri yüklenemedi: ${e.message}<br>
        <span style="color:var(--text2);font-size:0.8rem;">Firestore kurallarının admin okumaya izin verdiğinden emin ol.</span>
      </div>`;
  }
}

// ── PROFILE PAGE ──────────────────────────────────────────────
function renderProfilePage(){
  document.getElementById("root").innerHTML=`
  <div style="max-width:600px;margin:0 auto;padding:24px 20px;">
    ${navHTML("profile")}
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,#ff6b35,transparent);"></div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
        <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#ff6b35);
          display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;color:#000;font-weight:800;">
          ${(userData.name||"?")[0].toUpperCase()}
        </div>
        <div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--text);">${userData.name||""}</div>
          <div style="font-family:monospace;font-size:0.75rem;color:var(--text2);">${currentUser?.email||""}</div>
        </div>
      </div>
      <div style="margin-bottom:20px;">
        <div style="font-family:monospace;font-size:0.65rem;color:var(--text2);margin-bottom:6px;letter-spacing:2px;">GÖRÜNEN İSİM</div>
        <div style="display:flex;gap:8px;">
          <input id="newName" type="text" value="${userData.name||""}" placeholder="Adın Soyadın"
            style="flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
            padding:10px 14px;color:var(--text);font-family:inherit;font-size:0.9rem;outline:none;">
          <button id="saveNameBtn" style="background:#00d4ff;border:none;color:#000;padding:10px 18px;
            border-radius:8px;font-weight:800;cursor:pointer;font-family:monospace;font-size:0.8rem;white-space:nowrap;">Kaydet</button>
        </div>
        <div id="nameMsg" style="font-family:monospace;font-size:0.75rem;margin-top:6px;min-height:18px;"></div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:20px;">
        <div style="font-family:monospace;font-size:0.65rem;color:var(--text2);margin-bottom:12px;letter-spacing:2px;">ŞİFRE DEĞİŞTİR</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <input id="currentPass" type="password" placeholder="Mevcut şifre"
            style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:0.9rem;outline:none;">
          <input id="newPass" type="password" placeholder="Yeni şifre (en az 6 karakter)"
            style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:0.9rem;outline:none;">
          <input id="newPass2" type="password" placeholder="Yeni şifre tekrar"
            style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:0.9rem;outline:none;">
          <div id="passMsg" style="font-family:monospace;font-size:0.75rem;min-height:18px;"></div>
          <button id="savePassBtn" style="background:linear-gradient(135deg,#00d4ff,#0098cc);border:none;color:#000;
            padding:11px;border-radius:8px;font-weight:800;cursor:pointer;font-size:0.9rem;">Şifreyi Değiştir</button>
        </div>
      </div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:700;margin-bottom:4px;color:var(--text);">Tema</div>
          <div style="font-family:monospace;font-size:0.75rem;color:var(--text2);">${isDark?"🌙 Karanlık mod aktif":"☀️ Aydınlık mod aktif"}</div>
        </div>
        <button id="themeToggleBtn" style="background:var(--bg3);border:1px solid var(--border2);
          color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:600;">
          ${isDark?"☀️ Aydınlık Moda Geç":"🌙 Karanlık Moda Geç"}</button>
      </div>
    </div>
    <div style="background:rgba(255,71,87,0.05);border:1px solid rgba(255,71,87,0.2);border-radius:12px;padding:20px;">
      <div style="font-family:monospace;font-size:0.65rem;color:#ff4757;margin-bottom:12px;letter-spacing:2px;">TEHLİKELİ ALAN</div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <div>
          <div style="font-weight:700;font-size:0.9rem;margin-bottom:4px;color:var(--text);">Tüm ilerlemeyi sıfırla</div>
          <div style="font-family:monospace;font-size:0.72rem;color:var(--text2);">Konu tikleri, XP ve serini siler. Geri alınamaz!</div>
        </div>
        <button id="resetAllBtn" style="background:transparent;border:1px solid #ff4757;color:#ff4757;
          padding:9px 18px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:0.75rem;font-weight:700;">🗑 Sıfırla</button>
      </div>
    </div>
  </div>`;
  attachNav("profile");

  document.getElementById("saveNameBtn").addEventListener("click", async()=>{
    const name=document.getElementById("newName").value.trim();
    const msg=document.getElementById("nameMsg");
    if(!name){ msg.style.color="#ff4757"; msg.textContent="İsim boş olamaz."; return; }
    try{
      await updateProfile(currentUser,{displayName:name});
      userData.name=name; scheduleSave();
      msg.style.color="#2ed573"; msg.textContent="✅ İsim güncellendi!";
    } catch(e){ msg.style.color="#ff4757"; msg.textContent="Hata: "+e.message; }
  });

  document.getElementById("savePassBtn").addEventListener("click", async()=>{
    const cur=document.getElementById("currentPass").value;
    const np=document.getElementById("newPass").value;
    const np2=document.getElementById("newPass2").value;
    const msg=document.getElementById("passMsg");
    if(!cur||!np||!np2){ msg.style.color="#ff4757"; msg.textContent="Tüm alanları doldur."; return; }
    if(np.length<6){ msg.style.color="#ff4757"; msg.textContent="Yeni şifre en az 6 karakter olmalı."; return; }
    if(np!==np2){ msg.style.color="#ff4757"; msg.textContent="Yeni şifreler eşleşmiyor."; return; }
    try{
      const {EmailAuthProvider, reauthenticateWithCredential, updatePassword} =
        await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      const credential=EmailAuthProvider.credential(currentUser.email, cur);
      await reauthenticateWithCredential(currentUser, credential);
      await updatePassword(currentUser, np);
      msg.style.color="#2ed573"; msg.textContent="✅ Şifre başarıyla değiştirildi!";
      document.getElementById("currentPass").value="";
      document.getElementById("newPass").value="";
      document.getElementById("newPass2").value="";
    } catch(e){
      msg.style.color="#ff4757";
      if(e.code==="auth/wrong-password"||e.code==="auth/invalid-credential") msg.textContent="Mevcut şifre yanlış.";
      else msg.textContent="Hata: "+e.message;
    }
  });

  document.getElementById("themeToggleBtn").addEventListener("click",()=>{ toggleTheme(); renderProfilePage(); });

  document.getElementById("resetAllBtn").addEventListener("click",()=>{
    if(!confirm("Tüm ilerleme silinecek. Bunu geri alamazsın. Emin misin?")) return;
    userData.done={}; userData.xp=0; userData.streak=[]; userData.streakRecord=0;
    scheduleSave();
    alert("✅ İlerleme sıfırlandı.");
    setPage("dashboard");
  });
}
