// ── HELPERS ──────────────────────────────────────────────────
function daysTo(d){ return Math.max(0, Math.ceil((d - Date.now()) / 86400000)); }
function todayStr(){ return new Date().toDateString(); }
function countStreak(streak){
  let c=0, d=new Date();
  while(streak.includes(d.toDateString())&&c<400){ c++; d.setDate(d.getDate()-1); }
  return c;
}
function calcStats(){
  let tD=0,tT=0,aD=0,aT=0;
  Object.entries(TOPICS).forEach(([s,topics])=>{
    const isTyt=SUBJECTS[s].type==="tyt";
    topics.forEach((_,i)=>{
      if(isTyt){tT++; if(userData.done[s+":"+i])tD++;}
      else{aT++; if(userData.done[s+":"+i])aD++;}
    });
  });
  return{tD,tT,aD,aT,total:tD+aD,all:tT+aT};
}
function getLevel(xp){
  let lvl=LEVELS[0],idx=0;
  for(let i=LEVELS.length-1;i>=0;i--){ if(xp>=LEVELS[i].min){lvl=LEVELS[i];idx=i;break;} }
  const next=LEVELS[Math.min(idx+1,LEVELS.length-1)];
  const pct=idx===LEVELS.length-1?100:Math.round((xp-lvl.min)/(next.min-lvl.min)*100);
  return{lvl,idx,next,pct};
}

// ── FIRESTORE ────────────────────────────────────────────────
async function loadUserData(uid){
  const ref = doc(db,"users",uid);
  const snap = await getDoc(ref);
  if(snap.exists()) userData = { done:{}, xp:0, streak:[], name:"", ...snap.data() };
  else userData = { done:{}, xp:0, streak:[], name: currentUser.displayName||"" };
}

function scheduleSave(){
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async ()=>{
    if(!currentUser) return;
    await setDoc(doc(db,"users",currentUser.uid), userData, {merge:true});
  }, 1200);
}

// ── CONFETTI ──────────────────────────────────────────────────
function launchConfetti(){
  const colors=["#00d4ff","#ff6b35","#ffd60a","#2ed573","#a855f7","#ff4757"];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const el=document.createElement("div");
      const size=6+Math.random()*8;
      el.style.cssText=`position:fixed;width:${size}px;height:${size}px;border-radius:2px;
        left:${Math.random()*100}vw;top:-20px;z-index:9999;pointer-events:none;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation:cfFall ${2+Math.random()*2}s ${Math.random()*0.3}s linear forwards;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3500);
    },i*25);
  }
}

// ── TOGGLE TOPIC ─────────────────────────────────────────────
window.toggleTopic=function(subj,i){
  const key=subj+":"+i;
  const wasDone=!!userData.done[key];
  const xpAmt=SUBJECTS[subj].xp;
  userData.done[key]=!wasDone;
  const t=todayStr();
  if(!userData.streak.includes(t)) userData.streak.push(t);
  if(!wasDone){
    userData.xp+=xpAmt;
    const s=calcStats();
    const p=s.total/s.all;
    let em="✅",ti="KONU TAMAM!",tx="Harika! Bir adım daha attın. Devam et!";
    if(s.total===1){em="⭐";ti="İLK ADIM!";tx="İlk konunu tamamladın. Her büyük yolculuk bir adımla başlar.";}
    else if(s.total===5){em="🔥";ti="MOMENTUM!";tx="5 konu bitti! Ateş yanıyor, durma.";}
    else if(s.total===10){em="💪";ti="ÇALIŞIYOR!";tx="10 konu tamam. Ritim tutturuldu.";}
    else if(p>=0.25&&p<0.27){em="💎";ti="ÇEYREĞİ GEÇTİN!";tx="Konuların %25'ini tamamladın. İnanılmaz!";}
    else if(p>=0.50&&p<0.52){em="🚀";ti="YARIYA GELDİN!";tx="%50 tamamlandı. Çoğu insan bu noktaya gelemez.";}
    else if(p>=0.75&&p<0.77){em="👑";ti="NEREDEYSE BİTTİ!";tx="%75 tamamlandı. Zirve görünüyor!";}
    else if(p>=1){em="🏆";ti="EFSANE!";tx="Tüm konuları tamamladın. Sen artık başka birisin.";}
    showReward(em,ti,tx,xpAmt);
  } else {
    userData.xp=Math.max(0,userData.xp-xpAmt);
  }
  scheduleSave();
  renderTopics();
  renderStats();
};

// ── AUTH HANDLERS ────────────────────────────────────────────
window.doRegister=async function(){
  const name=document.getElementById("authName")?.value.trim();
  const email=document.getElementById("authEmail").value.trim();
  const pass=document.getElementById("authPass").value;
  const err=document.getElementById("authErr");
  if(!name||!email||!pass){ err.textContent="Tüm alanları doldur!"; return; }
  if(pass.length<6){ err.textContent="Şifre en az 6 karakter olmalı!"; return; }
  err.textContent="";
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
    userData.name=name;
    await setDoc(doc(db,"users",cred.user.uid),userData);
  } catch(e){
    if(e.code==="auth/email-already-in-use") err.textContent="Bu e-posta zaten kayıtlı!";
    else if(e.code==="auth/invalid-email") err.textContent="Geçersiz e-posta adresi!";
    else err.textContent="Hata: "+e.message;
  }
};

window.doLogin=async function(){
  const email=document.getElementById("authEmail").value.trim();
  const pass=document.getElementById("authPass").value;
  const err=document.getElementById("authErr");
  err.textContent="";
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  } catch(e){
    if(e.code==="auth/invalid-credential"||e.code==="auth/wrong-password") err.textContent="E-posta veya şifre hatalı!";
    else if(e.code==="auth/user-not-found") err.textContent="Bu e-posta ile kayıtlı kullanıcı yok!";
    else err.textContent="Hata: "+e.message;
  }
};

window.doLogout=async function(){
  await signOut(auth);
};

  appendChat(msg,"user");

- Hedef: Yazılım Mühendisliği (SAY)
- TYT: ${stats.tD}/${stats.tT} konu, AYT: ${stats.aD}/${stats.aT} konu tamamlandı

  const loadEl=appendChat("⏳ Düşünüyor...","coach",true);

      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,
        messages:[{role:"user",content:msg}]})
    });
    const data=await res.json();
    loadEl.remove();
    appendChat(data.content?.find(c=>c.type==="text")?.text||"Hata oluştu.","coach");
  } catch{
    loadEl.remove();
    appendChat("Bağlantı hatası, lütfen tekrar dene.","coach");
  }
};

function appendChat(text,role,temp=false){

// ── RENDER STATS ─────────────────────────────────────────────
function renderStats(){
  const s=calcStats();
  const {lvl,idx,next,pct}=getLevel(userData.xp);
  const tytPct=s.tT?Math.round(s.tD/s.tT*100):0;
  const aytPct=s.aT?Math.round(s.aD/s.aT*100):0;
  el("sTotalDone",s.total);
  el("sTotalLeft",s.all-s.total);
  el("sXP",userData.xp);
  el("sStreak",countStreak(userData.streak)+" 🔥");
  el("sLevelBadge","LVL "+(idx+1));
  el("sLevelName",lvl.name);
  el("sXPLabel",userData.xp+" / "+next.min+" XP");
  bar("xpBar",pct,"linear-gradient(90deg,#ffd60a,#ff6b35)");
  bar("tytBar",tytPct,"#00d4ff");
  bar("aytBar",aytPct,"#ff6b35");
  pctEl("tytPct",tytPct);
  pctEl("aytPct",aytPct);
  // streak days
  const streakRow=document.getElementById("streakRow");
  if(streakRow){
    streakRow.innerHTML="";
    for(let i=0;i<7;i++){
      const d=new Date(); d.setDate(d.getDate()-6+i);
      const ds=d.toDateString();
      const isDone=userData.streak.includes(ds);
      const isToday=ds===todayStr();
      const div=document.createElement("div");
      div.style.cssText=`width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
        justify-content:center;font-family:monospace;font-size:0.6rem;
        background:${isDone?"#2ed573":"transparent"};
        border:1px solid ${isDone?"#2ed573":isToday?"#00d4ff":"rgba(255,255,255,0.07)"};
        color:${isDone?"#000":isToday?"#00d4ff":"#5a6a7e"};`;
      div.textContent=d.getDate();
      streakRow.appendChild(div);
    }
  }
}

function el(id,val){ const e=document.getElementById(id); if(e) e.textContent=val; }
function bar(id,w,clr){ const e=document.getElementById(id); if(e){e.style.width=w+"%";e.style.background=clr;} }
function pctEl(id,v){ const e=document.getElementById(id); if(e) e.textContent=v+"%"; }
